<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Signage</title>

  <!-- 🔤 Schrift (Inter) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #f5f5f7;
      font-family: 'Inter', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      position: relative;
      background:
        radial-gradient(circle at 50% 15%, rgba(255,255,255,0.10), transparent 30%),
        linear-gradient(to bottom, #0a0a0a 0%, #000000 45%, #000000 100%);
    }

    .content {
      position: absolute;
      top: 42%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90%;
      text-align: center;
    }

    .time {
      font-size: clamp(2rem, 8vw, 10rem);
      font-weight: 300;
      letter-spacing: -0.04em;
      line-height: 0.95;
      color: #ffffff;
    }

    .date {
      margin-top: 1.2rem;
      font-size: clamp(1.2rem, 2.8vw, 2.8rem);
      font-weight: 300;
      letter-spacing: -0.01em;
      color: rgba(255, 255, 255, 0.72);
    }

    .logo-wrapper {
      position: absolute;
      bottom: 4vh;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      display: flex;
      justify-content: center;
      pointer-events: none;
    }

    .logo {
      width: clamp(90px, 9vw, 180px);
      max-width: 50%;
      opacity: 0.82;
    }

    @media (orientation: portrait) {
      .content {
        top: 40%;
      }

      .time {
        font-size: clamp(4.8rem, 20vw, 11rem);
      }

      .date {
        font-size: clamp(1.1rem, 4.5vw, 2.2rem);
      }

      .logo {
        width: clamp(80px, 20vw, 150px);
      }
    }
  </style>
</head>

<body>
  <div class="content">
    <div class="time" id="time">--:--</div>
    <div class="date" id="date">Datum</div>
  </div>

  <div class="logo-wrapper">
    <img src="logo.png" class="logo" alt="Logo">
  </div>

  <script>
    function updateTime() {
      const now = new Date();

      const time = now.toLocaleTimeString("de-CH", {
        hour: "2-digit",
        minute: "2-digit"
      });

      const date = now.toLocaleDateString("de-CH", {
        weekday: "long",
        day: "2-digit",
        month: "long",
        year: "numeric"
      });

      document.getElementById("time").textContent = time;
      document.getElementById("date").textContent = date;
    }

    updateTime();

    function startPreciseMinuteRefresh() {
      const now = new Date();
      const delay = (60 - now.getSeconds()) * 1000 - now.getMilliseconds();

      setTimeout(() => {
        updateTime();
        setInterval(updateTime, 60000);
      }, delay);
    }

    startPreciseMinuteRefresh();
  </script>
</body>
</html>
