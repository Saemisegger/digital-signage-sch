<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Signage</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000000;
      color: #f5f5f7;
      font-family: 'Inter', Arial, sans-serif;
    }

    body {
      position: relative;
      background: #000000;
    }

    .app {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .content {
      position: absolute;
      top: 38%;
      left: 50%;
      width: 90%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .time {
      font-size: 110px;
      font-weight: 300;
      line-height: 1;
      letter-spacing: -2px;
      color: #ffffff;
    }

    .date {
      margin-top: 14px;
      font-size: 28px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.72);
    }

    .logo-wrapper {
      position: absolute;
      bottom: 40px;
      left: 0;
      width: 100%;
      text-align: center;
    }

    .logo {
      width: 140px;
      height: auto;
      opacity: 0.85;
    }

    @media screen and (max-width: 1080px) {
      .content {
        top: 36%;
      }

      .time {
        font-size: 90px;
      }

      .date {
        font-size: 24px;
      }

      .logo {
        width: 120px;
      }
    }

    @media screen and (max-width: 720px) {
      .time {
        font-size: 72px;
      }

      .date {
        font-size: 20px;
      }

      .logo {
        width: 100px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="content">
      <div class="time" id="time">--:--</div>
      <div class="date" id="date">Datum</div>
    </div>

    <div class="logo-wrapper">
      <img src="logo.png" class="logo" alt="Logo">
    </div>
  </div>

  <script>
    function updateTime() {
      var now = new Date();

      var time = now.toLocaleTimeString("de-CH", {
        hour: "2-digit",
        minute: "2-digit"
      });

      var date = now.toLocaleDateString("de-CH", {
        weekday: "long",
        day: "2-digit",
        month: "long",
        year: "numeric"
      });

      document.getElementById("time").textContent = time;
      document.getElementById("date").textContent = date;
    }

    updateTime();

    function startPreciseMinuteRefresh() {
      var now = new Date();
      var delay = (60 - now.getSeconds()) * 1000 - now.getMilliseconds();

      setTimeout(function () {
        updateTime();
        setInterval(updateTime, 60000);
      }, delay);
    }

    startPreciseMinuteRefresh();
  </script>
</body>
</html>
